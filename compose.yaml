name: 21miron-video-platform

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ovenmediaengine:
    image: airensoft/ovenmediaengine:latest
    container_name: ovenmediaengine
    restart: unless-stopped
    network_mode: host
    environment:
      OME_HOST_IP: ${VIDEO_SERVER_IP}
    volumes:
      - ome_logs:/var/log/ovenmediaengine
    shm_size: 1gb

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      VIDEO_SERVER_IP: ${VIDEO_SERVER_IP}
      OME_HTTP_URL: http://host.docker.internal:3333
      STREAM_IDS: ${STREAM_IDS:-}
      STREAM_DISCOVERY_PREFIX: ${STREAM_DISCOVERY_PREFIX:-test}
      STREAM_DISCOVERY_START: ${STREAM_DISCOVERY_START:-1}
      STREAM_DISCOVERY_END: ${STREAM_DISCOVERY_END:-200}
      STREAM_DISCOVERY_TIMEOUT: ${STREAM_DISCOVERY_TIMEOUT:-0.35}
      STREAM_DISCOVERY_WORKERS: ${STREAM_DISCOVERY_WORKERS:-32}
      STREAM_DISCOVERY_CACHE_TTL: ${STREAM_DISCOVERY_CACHE_TTL:-2}
      STREAM_DEPARTMENT_SIZE: ${STREAM_DEPARTMENT_SIZE:-50}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      FREEIPA_ENABLED: ${FREEIPA_ENABLED:-false}
      FREEIPA_URL: ${FREEIPA_URL:-}
      FREEIPA_BASE_DN: ${FREEIPA_BASE_DN:-}
      FREEIPA_BIND_DN: ${FREEIPA_BIND_DN:-}
      FREEIPA_BIND_PASSWORD: ${FREEIPA_BIND_PASSWORD:-}
      FREEIPA_ADMIN_GROUP: ${FREEIPA_ADMIN_GROUP:-video-admins}
      FREEIPA_OPERATOR_GROUP: ${FREEIPA_OPERATOR_GROUP:-video-operator}
      FREEIPA_VIEWER_GROUP: ${FREEIPA_VIEWER_GROUP:-video-viewer}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_BIND_ADDRESS:-0.0.0.0}:${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge

volumes:
  postgres_data:
  ome_logs:
